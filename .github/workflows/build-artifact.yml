name: Build artifact

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build:api
        env:
          VITE_SHIORI_API_URL: ${{ vars.VITE_SHIORI_API_URL || 'https://api.shiori.cloud' }}

      - uses: actions/upload-artifact@v4
        with:
          name: shiori-dist
          path: dist/
          retention-days: 14
