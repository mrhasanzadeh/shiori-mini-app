name: Publish Docker image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      vite_shiori_api_url:
        description: Public API URL baked into the mini-app SPA
        required: false
        type: string

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build args
        id: buildargs
        env:
          INPUT_API_URL: ${{ inputs.vite_shiori_api_url }}
          VAR_API_URL: ${{ vars.VITE_SHIORI_API_URL }}
          VAR_BOT: ${{ vars.VITE_TELEGRAM_BOT_USERNAME }}
        run: |
          if [ -n "$INPUT_API_URL" ]; then
            API_URL="$INPUT_API_URL"
          elif [ -n "$VAR_API_URL" ]; then
            API_URL="$VAR_API_URL"
          else
            API_URL="https://api.shiori.dev"
            echo "::warning::VITE_SHIORI_API_URL not set — using default $API_URL. Set repo variable VITE_SHIORI_API_URL to override."
          fi
          BOT="${VAR_BOT:-ShioriUploadBot}"
          echo "vite_shiori_api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "vite_telegram_bot_username=$BOT" >> "$GITHUB_OUTPUT"
          echo "Using VITE_SHIORI_API_URL=$API_URL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SHIORI_API_URL=${{ steps.buildargs.outputs.vite_shiori_api_url }}
            VITE_TELEGRAM_BOT_USERNAME=${{ steps.buildargs.outputs.vite_telegram_bot_username }}
